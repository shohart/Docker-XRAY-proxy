services:
  xray:
    image: ${XRAY_IMAGE:-ghcr.io/xtls/xray-core:26.2.6}
    container_name: xray
    restart: unless-stopped
    network_mode: "host"
    user: "0:0"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./config:/etc/xray
      - ./data:/var/log/xray
    command: ["run", "-c", "/etc/xray/config.json"]

  gateway:
    image: alpine:3.20
    container_name: xray-gateway
    restart: unless-stopped
    network_mode: "host"
    cap_add:
      - NET_ADMIN
    volumes:
      - ./scripts:/scripts:ro
    env_file:
      - .env
    entrypoint:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache iptables iproute2 >/dev/null
        /bin/sh /scripts/gateway_iptables.sh
        tail -f /dev/null

  updater:
    image: python:3.12-alpine
    container_name: xray-updater
    restart: unless-stopped
    volumes:
      - ./config:/etc/xray
      - ./data:/var/log/xray
      - ./scripts:/scripts:ro
    entrypoint:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache curl jq ca-certificates >/dev/null
        update-ca-certificates >/dev/null 2>&1 || true
        while true; do
          /bin/sh /scripts/update_subscription.sh || true
          sleep "$(( ${SUB_UPDATE_INTERVAL_MIN:-60} * 60 ))"
        done
    env_file:
      - .env

  xui:
    image: ${THREEX_UI_IMAGE:-ghcr.io/mhsanaei/3x-ui:v2.5.2}
    container_name: xray-3x-ui
    restart: unless-stopped
    ports:
      - "${THREEX_UI_BIND_IP:-127.0.0.1}:${THREEX_UI_PORT:-2053}:2053/tcp"
    volumes:
      - xui-db:/etc/x-ui
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    tmpfs:
      - /tmp
    networks:
      - control-plane
    healthcheck:
      test:
        - CMD-SHELL
        - "test -s /etc/x-ui/x-ui.db && grep -qiE ':[0]*805 ' /proc/net/tcp /proc/net/tcp6"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  xui-db:

networks:
  control-plane:
    driver: bridge
